    <style>

        }

          font-family: 'Source Code Pro';

        }

      .footer a {

        color: #555555;

      }

      .footer a:hover {

        text-shadow: 0 0 10px #FFF, 0 0 20px #00FFFF, 0 0 35px #00FFFF; /* Add glow effect */

</head>
