    <!-- Scales title to window size. It allows me to scale stuff in terms of the window size instead of pixels. Look for "vw" units used instead of "px" -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

	<style>
            .header{
                overflow: hidden;
                padding: 3px;
                text-align: center;
                background:#FFF;
                position: sticky;
                position: -webkit-sticky;
                top: 0;
                color:#555555;
                font-family:'Source Code Pro';
		        font-size: 3vw;
            }
            /* The buttons */

                font-family:'Source Code Pro';

                color:#949494;
            }
            .btn:hover{
                background: #b0bec0;
                color:#FFF;
            }
                
           
	        /* The gray paragraph blocks */
            .p{
                font-family:'Source Code Pro';
                margin-right:7%;
                margin-left:7%;
                margin-top:2%;
                text-align: center;
                background:#FFF;
                padding:10px;
                font-size:19px;
                color:#555555;
            }
            /* Makes the images scaleable to the window size  */
	        .responsive{
		        width: 100%;
  		        max-width: 1000px;
  		        height: auto;
	        }

            window.onscroll = function () {

                    document.getElementById("header").style.fontSize = "1.7vw";
                } else {
                    document.getElementById("header").style.fontSize = "3vw";
                }
            };

            }
